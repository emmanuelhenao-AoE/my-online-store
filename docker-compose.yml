# Local Jenkins for Docker Desktop
#
# First time:  docker compose up -d --build
# Open:        http://localhost:8080
# Stop:        docker compose down

services:
  jenkins:
    build:
      context: ./jenkins
    image: my-online-store-jenkins:local
    container_name: my-online-store-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true

volumes:
  jenkins_home:
